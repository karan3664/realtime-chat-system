<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💬 Real-time Chat System</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      display: flex;
      width: 100%;
      max-width: 1200px;
      height: 600px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .sidebar {
      width: 250px;
      background: #f5f5f5;
      border-right: 2px solid #eee;
      padding: 20px;
      overflow-y: auto;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #ffffff;
    }

    .message {
      margin: 15px 0;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-content {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .message-bubble {
      background: #f0f0f0;
      padding: 12px 15px;
      border-radius: 10px;
      max-width: 70%;
      word-wrap: break-word;
    }

    .message.own .message-bubble {
      background: #667eea;
      color: white;
      margin-left: auto;
    }

    .message-time {
      font-size: 0.8rem;
      color: #999;
      margin-top: 5px;
    }

    .sender-name {
      font-weight: bold;
      color: #667eea;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }

    .message.own .sender-name {
      color: #555;
    }

    .typing-indicator {
      color: #999;
      font-style: italic;
      padding: 10px;
      font-size: 0.9rem;
    }

    .input-area {
      padding: 15px 20px;
      border-top: 2px solid #eee;
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      border: 2px solid #eee;
      border-radius: 25px;
      padding: 10px 15px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    .join-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .users-list {
      margin-top: 20px;
    }

    .users-list h3 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .user-item {
      background: white;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-indicator {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
    }

    .system-message {
      background: #fff3cd;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      text-align: center;
      color: #856404;
      font-size: 0.9rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="join-form" id="joinForm">
        <h2 style="color: #667eea; margin-bottom: 15px;">💬 Chat</h2>
        <input type="text" id="userName" placeholder="Enter your name" required>
        <button onclick="joinChat()">Join Chat</button>
      </div>

      <div class="users-list hidden" id="usersList">
        <h3>👥 Online Users (<span id="userCount">0</span>)</h3>
        <div id="onlineUsers"></div>
      </div>
    </div>

    <div class="chat-area hidden" id="chatArea">
      <div class="header">
        <h1>💬 Real-time Chat System</h1>
        <p id="userGreeting"></p>
      </div>

      <div class="messages" id="messages"></div>
      <div class="typing-indicator hidden" id="typingIndicator">Someone is typing...</div>

      <div class="input-area">
        <input 
          type="text" 
          id="messageInput" 
          placeholder="Type a message..."
          disabled
          onkeypress="handleKeyPress(event)"
        >
        <button onclick="sendMessage()" disabled id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    const socket = io("http://localhost:3001");
    let currentUser = null;

    function joinChat() {
      const name = document.getElementById("userName").value.trim();
      if (!name) {
        alert("Please enter your name");
        return;
      }

      currentUser = name;
      socket.emit("join", { name });

      // Update UI
      document.getElementById("joinForm").classList.add("hidden");
      document.getElementById("usersList").classList.remove("hidden");
      document.getElementById("chatArea").classList.remove("hidden");
      document.getElementById("userGreeting").textContent = `Welcome, ${name}!`;
      document.getElementById("messageInput").disabled = false;
      document.getElementById("sendBtn").disabled = false;
    }

    function sendMessage() {
      const text = document.getElementById("messageInput").value.trim();
      if (!text) return;

      socket.emit("send_message", { text });
      document.getElementById("messageInput").value = "";
    }

    function handleKeyPress(e) {
      if (e.key === "Enter") sendMessage();
    }

    socket.on("receive_message", (data) => {
      const messagesDiv = document.getElementById("messages");
      const msgElement = document.createElement("div");
      msgElement.className = `message ${data.sender === currentUser ? "own" : ""}`;
      msgElement.innerHTML = `
        <div class="message-content">
          <img src="${data.avatar}" class="avatar">
          <div>
            <div class="sender-name">${data.sender}</div>
            <div class="message-bubble">${data.text}</div>
            <div class="message-time">${new Date(data.timestamp).toLocaleTimeString()}</div>
          </div>
        </div>
      `;
      messagesDiv.appendChild(msgElement);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    socket.on("user_joined", (data) => {
      const messagesDiv = document.getElementById("messages");
      const systemMsg = document.createElement("div");
      systemMsg.className = "system-message";
      systemMsg.textContent = data.message;
      messagesDiv.appendChild(systemMsg);

      document.getElementById("userCount").textContent = data.totalUsers;
      updateUsersList(data.users);
    });

    socket.on("user_left", (data) => {
      const messagesDiv = document.getElementById("messages");
      const systemMsg = document.createElement("div");
      systemMsg.className = "system-message";
      systemMsg.textContent = data.message;
      messagesDiv.appendChild(systemMsg);

      document.getElementById("userCount").textContent = data.totalUsers;
      updateUsersList(data.users);
    });

    socket.on("user_typing", (data) => {
      const indicator = document.getElementById("typingIndicator");
      if (data.isTyping) {
        indicator.textContent = `${data.name} is typing...`;
        indicator.classList.remove("hidden");
      } else {
        indicator.classList.add("hidden");
      }
    });

    function updateUsersList(users) {
      const usersList = document.getElementById("onlineUsers");
      usersList.innerHTML = users
        .map(u => `<div class="user-item"><div class="online-indicator"></div>${u.name}</div>`)
        .join("");
    }

    // Typing indicator
    let typingTimeout;
    document.getElementById("messageInput").addEventListener("input", () => {
      socket.emit("typing", { isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        socket.emit("typing", { isTyping: false });
      }, 1000);
    });
  </script>
</body>
</html>
